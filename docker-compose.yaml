services:
  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - haconfig:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    environment:
      TZ: Europe/Amsterdam
    ports:
      - "127.0.0.1:8123:8123"

volumes:
  haconfig:

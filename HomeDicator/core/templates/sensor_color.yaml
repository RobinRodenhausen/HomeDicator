platform: homeassistant
id: ${hass_sensor_id}
entity_id: sensor.${hass_sensor_id}
on_value:
  - lvgl.label.update:
      id: lvgl_value_label_${hass_sensor_id}
      text: !lambda |-
        char buffer[10];
        snprintf(buffer, sizeof(buffer), "%.1f", x);
        return buffer;
  - lambda: |-
      lv_color_t color;
      if (x < ${threshold_1}) {
        color = lv_color_hex(${color_1});
      } else if (x < ${threshold_2}) {
        color = lv_color_hex(${color_2});
      } else if (x < ${threshold_3}) {
        color = lv_color_hex(${color_3});
      } else {
        color = lv_color_hex(${color_4});
      }
      lv_obj_set_style_bg_color(id(lvgl_icon_bg_${hass_sensor_id}), color, LV_PART_MAIN);

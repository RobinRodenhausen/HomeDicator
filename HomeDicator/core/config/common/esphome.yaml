esphome:
  name: ${device_name}
  friendly_name: ${device_friendly_name}
  project:
    name: "RobinRodenhausen.HomeDicator"
    version: 0.0.1

  includes:
    - HomeDicator/core/helpers/adjust_color.h

  platformio_options:
    build_unflags: -Werror=all

  on_boot:
    - priority: 800.0
      then:
        - script.execute: create_pager_dots
    - priority: 250.0
      then:
        # Using ESPhome packages will cause the settings page to be the first one, lvgl.page.next will make it look like the last one again.
        - lvgl.page.next:
            animation: NONE
    - priority: 200.0
      then:
        - select.set_index:
            id: turn_off_screen_after_selector
            index: !lambda "return id(turn_off_screen_after_value);"
    - priority: 100.0
      then:
        - lambda: |-
            // Register swipe gesture callbacks on all LVGL screens (pages)
            // Skip settings and about pages (they use skip: true / back navigation)
            static auto gesture_cb = [](lv_event_t* e) {
              lv_dir_t dir = lv_indev_get_gesture_dir(lv_indev_get_act());
              if (dir == LV_DIR_LEFT) {
                id(next_page).execute();
              } else if (dir == LV_DIR_RIGHT) {
                id(previous_page).execute();
              }
            };

            lv_disp_t* disp = lv_disp_get_default();
            for (uint32_t s = 0; s < disp->screen_cnt; s++) {
              lv_obj_t* scr = disp->screens[s];

              // Skip about page
              if (scr == id(about)->obj) {
                continue;
              }

              lv_obj_add_event_cb(scr, gesture_cb, LV_EVENT_GESTURE, nullptr);

              // BFS: set EVENT_BUBBLE on all children so gestures propagate up to the screen
              std::vector<lv_obj_t*> queue;
              for (uint32_t i = 0; i < lv_obj_get_child_cnt(scr); i++) {
                queue.push_back(lv_obj_get_child(scr, i));
              }
              while (!queue.empty()) {
                lv_obj_t* obj = queue.back();
                queue.pop_back();
                lv_obj_add_flag(obj, LV_OBJ_FLAG_EVENT_BUBBLE);
                for (uint32_t i = 0; i < lv_obj_get_child_cnt(obj); i++) {
                  queue.push_back(lv_obj_get_child(obj, i));
                }
              }
            }

            // Populate IP address label
            auto ips = network::get_ip_addresses();
            char buf[40];
            ips[0].str_to(buf);
            if (strlen(buf) > 0 && strcmp(buf, "0.0.0.0") != 0) {
              lv_label_set_text(id(ip_address_ui_label), buf);
            } else {
              lv_label_set_text(id(ip_address_ui_label), "N/A");
            }

logger:
  level: DEBUG # TODO: Change back

api:
  encryption:
    key: ${api_key}
  on_client_connected:
    - if:
        condition:
          - lambda: |-
              return client_info.find("Home Assistant") != std::string::npos;
        then:
          - delay: 2s # So all sensors can load their values
          - lvgl.widget.hide: connecting_view
  on_client_disconnected:
    - if:
        condition:
          - lambda: |-
              return client_info.find("Home Assistant") != std::string::npos;
        then:
          - lvgl.widget.show: connecting_view

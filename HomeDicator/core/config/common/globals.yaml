globals:
  - id: current_page
    type: int
    restore_value: no
    initial_value: "0"
  - id: pager_dots
    type: std::vector<lv_obj_t*>
    restore_value: no
  - id: total_pages
    type: int
    restore_value: no
    initial_value: "0"
  - id: user_is_interacting
    type: bool
    initial_value: "false"
    restore_value: no
  - id: turn_off_screen_after_value
    type: int
    initial_value: "0"
    restore_value: yes

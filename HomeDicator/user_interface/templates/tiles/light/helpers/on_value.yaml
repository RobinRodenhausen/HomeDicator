if:
  condition:
    lambda: |-
      return id(user_is_interacting);
  then:
    - lvgl.label.update:
        id: lvgl_value_label_${hass_light_id}
        text: !lambda |-
          if (std::isnan(x) || x == 0) return std::string("Off");
          char buffer[10];
          snprintf(buffer, sizeof(buffer), "%.0f", (x / 255.0f) * 100.0f);
          return buffer;
    - lvgl.widget.update:
        id: lvgl_unit_label_${hass_light_id}
        hidden: !lambda |-
          return std::isnan(x) || x == 0;
    - lvgl.widget.update:
        id: lvgl_icon_bg_${hass_light_id}
        bg_opa: !lambda |-
          return (std::isnan(x) || x == 0) ? LV_OPA_TRANSP : LV_OPA_COVER;
        bg_color: !lambda |-
          return lv_color_hex(${color});
    - lvgl.label.update:
        id: lvgl_icon_label_${hass_light_id}
        text: !lambda |-
          if (std::isnan(x) || x == 0) return std::string("${icon_off}");
          return std::string("${icon}");
        text_color: !lambda |-
          return (std::isnan(x) || x == 0) ? lv_color_hex(${color}) : lv_color_hex(0x272727);
    - homeassistant.action:
        action: light.turn_on
        data:
          entity_id: light.${hass_light_id}
          brightness: !lambda |-
            return static_cast<int>(x);
